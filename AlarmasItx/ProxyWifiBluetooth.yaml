esphome:
  name: bluetooth-proxy-esp32
  on_boot:
    then:
      - script.execute: wifi_status

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  # level: DEBUG
  level: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 1min

  fast_connect: true

  on_connect:
    then:
      - script.stop: wifi_status
      - script.execute: wifi_connected

  on_disconnect:
    then:
      - script.execute: wifi_status

  ap:
    ssid: "Temperatura sala_4"
    password: !secret ap_password
    ap_timeout: 1min

captive_portal:

# ////////////////////////////////////////////////////////////////////////

# -------- HTTP --------
http_request:
  useragent: esphome-btproxy
  timeout: 3s
  verify_ssl: false
  id: http_request_sala4

# -------- VARIABLES --------
globals:
  - id: temp_to_send
    type: float
    restore_value: no
    initial_value: "NAN"

  - id: hum_to_send
    type: float
    restore_value: no
    initial_value: "NAN"

  - id: bat_to_send
    type: float
    restore_value: no
    initial_value: "NAN"

  - id: last_ble_packet
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: firebase_url_secret
    type: std::string
    initial_value: !secret firebase_sala4_grafica

#---------- LED ESTADO WIFI -----------
output:
  - platform: gpio
    pin: GPIO2
    id: wifi_led
    inverted: true

light:
  - platform: binary
    output: wifi_led
    id: wifi_led_light

# -------- TIME --------
time:
  - platform: sntp
    id: esptime
    timezone: "America/Bogota"

#-------- BLUETOOTH --------
esp32_ble_tracker:
  scan_parameters:
    active: false
    interval: 300ms
    window: 150ms # Escucha el 50% del tiempo
    # interval: 100ms
    # window: 80ms   # Escucha el 80% del tiempo
    # interval: 1100ms
    # window: 100ms # Escucha el 9% del tiempo

  on_ble_service_data_advertise:
    - mac_address: A4:C1:38:23:79:B1
      service_uuid: FCD2
      then:
        - lambda: |-
            id(last_ble_packet) = millis();
            auto data = x;
            for (size_t i = 0; i < data.size(); i++) {

              // temperatura BTHome 
              if (data[i] == 0x02 && i + 2 < data.size()) {
                int16_t raw = data[i+1] | (data[i+2] << 8);
                float temp = raw * 0.01;
                id(temp_to_send) = temp;
                i += 2;
              }

              // humedad BTHome
              else if (data[i] == 0x03 && i + 2 < data.size()) {
                uint16_t raw = data[i+1] | (data[i+2] << 8);
                float hum = raw * 0.01;
                id(hum_to_send) = hum;
                i += 2;
              }

              // batería BTHome
              else if (data[i] == 0x01 && i + 1 < data.size()) {
                id(bat_to_send) = data[i+1];
                i += 1;
              }
            }

interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: |-
              return wifi::global_wifi_component->is_connected() && id(esptime).now().is_valid();
          then:
            - script.execute: send_temp_hum
            - script.execute: send_heartbeat
            - script.execute: send_to_graph

# -------- SCRIPT ENVÍO A FIREBASE TEMP Y HUM --------
script:
  - id: send_temp_hum
    mode: queued
    then:
      - http_request.send:
          id: http_request_sala4
          method: PATCH
          url: !secret firebase_sala4_TempHum
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buffer[160];

            if (std::isnan(id(temp_to_send))) {
              sprintf(buffer,
                "{\"temperatura\":\"null\", \"humedad\":\"null\", \"bateria\":\"null\", \"estado\": \"offline\"}"
              );
            } else {
              sprintf(buffer,
                "{\"temperatura\": %.2f, \"humedad\": %.2f, \"bateria\": %.0f, \"estado\": \"online\"}",
                id(temp_to_send),
                id(hum_to_send),
                id(bat_to_send)
              );
            }

            return std::string(buffer);

  # -------- ENVÍO A FIREBASE HEARTBEAT (SIGUE VIVO) --------
  - id: send_heartbeat
    mode: restart
    then:
      - http_request.send:
          id: http_request_sala4
          method: PATCH
          url: !secret firebase_sala4_heartbeat
          request_headers:
            Content-Type: application/json
          body: '{"timestamp":{".sv":"timestamp"}}'

  # -------- GRAFICA --------
  - id: send_to_graph
    mode: restart
    then:
      - http_request.post:
          id: http_request_sala4
          url: !lambda |-
            auto now = id(esptime).now();

            char url_buffer[160];

            sprintf(
              url_buffer,
              "%s%04d-%02d-%02d/%02d.json",
              id(firebase_url_secret).c_str(),
              now.year,
              now.month,
              now.day_of_month,
              now.hour
            );

            return std::string(url_buffer);
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            float t = id(temp_to_send);
            time_t now = id(esptime).now().timestamp;
            unsigned long long ts_ms = (unsigned long long) now * 1000ULL;

            char body[64];
            snprintf(
              body,
              sizeof(body),
              "{\"t\": %.2f, \"ts\": %llu}",
              t,
              ts_ms
            );

            return std::string(body);

          capture_response: false

  #---------- SCRIPT CONEXIÓN WIFI ------------------------
  - id: wifi_status
    mode: restart
    then:
      - while:
          condition:
            not:
              wifi.connected:
          then:
            - if:
                condition:
                  wifi.ap_active
                then:
                  - light.turn_on: wifi_led_light
                  - delay: 800ms
                  - light.turn_off: wifi_led_light
                  - delay: 800ms
                else:
                  - light.turn_on: wifi_led_light
                  - delay: 200ms
                  - light.turn_off: wifi_led_light
                  - delay: 200ms

  - id: wifi_connected
    then:
      - light.turn_on: wifi_led_light