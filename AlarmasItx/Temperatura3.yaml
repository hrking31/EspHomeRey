esphome:
  name: temperatura-sala3

esp8266:
  board: d1_mini_lite

logger:
  # level: DEBUG
  level: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 0s

  ap:
    ssid: "Temperatura sala_3"
    password: !secret ap_password
    ap_timeout: 90s

captive_portal:

  # ////////////////////////////////////////////////////////////////////////

# -------- HTTP --------
http_request:
  useragent: esphome/d1mini
  timeout: 5s
  verify_ssl: false
  id: http_request_sala3

# -------- VARIABLES --------
globals:
  - id: last_temp_sent_to_function
    type: float
    initial_value: "NAN"

  - id: last_hum_sent_to_function
    type: float
    initial_value: "NAN"

  - id: last_hum_valid
    type: float
    initial_value: "0"

  - id: error_enviado
    type: bool
    restore_value: no
    initial_value: "false"

  - id: temp_to_send
    type: float

  - id: hum_to_send
    type: float

  - id: sensor_ok
    type: bool
    initial_value: "false"

  - id: firebase_url_secret
    type: std::string
    initial_value: !secret firebase_sala3_grafica

#---------- LED ESTADO WIFI -----------
output:
  - platform: gpio
    pin: D4
    id: wifi_led

light:
  - platform: binary
    output: wifi_led
    id: wifi_led_light

# -------- TIME --------
time:
  - platform: sntp
    id: esptime
    timezone: "America/Bogota"

# -------- DHT11 --------
sensor:
  - platform: dht
    pin: D1
    model: DHT11
    update_interval: 30s
    temperature:
      id: temp_dht
      filters:
        - filter_out: NAN
      on_value:
        then:
          - lambda: |-
              bool recuperado = !id(sensor_ok);
              id(sensor_ok) = true;
              id(error_enviado) = false;
              id(temp_to_send) = x;
              if (!std::isnan(id(hum_dht).state)) {
              id(last_hum_valid) = id(hum_dht).state;
              }
              id(hum_to_send) = id(last_hum_valid);

              float diff_temp = std::abs(x - id(last_temp_sent_to_function));
              float diff_hum = std::abs(id(hum_to_send) - id(last_hum_sent_to_function));

              bool tiene_humedad = !std::isnan(id(hum_dht).state);

              if (tiene_humedad &&(recuperado || std::isnan(id(last_temp_sent_to_function)) || diff_temp >= 0.3 || diff_hum >= 3.0)) {
                  id(send_temp_hum).execute();
                  id(last_temp_sent_to_function) = x;
                  id(last_hum_sent_to_function) = id(hum_to_send);
              }

      on_raw_value:
        then:
          - lambda: |-
              if (std::isnan(x)) {
                if (!id(error_enviado)) {
                  id(sensor_ok) = false;
                  id(temp_to_send) = NAN;
                  id(hum_to_send) = NAN;
                  id(send_temp_hum).execute();
                  id(error_enviado) = true;
                }
              }

    humidity:
      id: hum_dht
      filters:
        - filter_out: NAN

# -------- SCRIPT ENVÍO A FIREBASE TEMP Y HUM --------
script:
  - id: send_temp_hum
    mode: restart
    then:
      - http_request.send:
          id: http_request_sala3
          method: PATCH
          url: !secret firebase_sala3_TempHum
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            char buffer[64];
            if (std::isnan(id(temp_to_send))) {
              sprintf(buffer, "{\"temperatura\": \"null\", \"humedad\": \"null\"}");
            } else {
              sprintf(
                buffer,
                "{\"temperatura\": %.2f, \"humedad\": %.2f}",
                id(temp_to_send),
                id(hum_to_send)
              );
            }
            return (std::string) buffer;

  # -------- ENVÍO A FIREBASE HEARTBEAT (SIGUE VIVO) --------
  - id: enviar_vivo
    mode: single
    then:
      - http_request.send:
          id: http_request_sala3
          method: PATCH
          url: !secret firebase_sala3_heartbeat
          request_headers:
            Content-Type: application/json
          body: '{"timestamp":{".sv":"timestamp"}}'

  # -------- GRÁFICA --------
  - id: enviar_grafica
    mode: single
    then:
      - http_request.post:
          id: http_request_sala3
          url: !lambda |-
            auto now = id(esptime).now();
            char url_buffer[160];
            sprintf(
              url_buffer,
              "%s%04d-%02d-%02d/%02d.json",
              id(firebase_url_secret).c_str(),
              now.year,
              now.month,
              now.day_of_month,
              now.hour
            );

            return std::string(url_buffer);
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            float t = id(temp_dht).state;
            time_t now = id(esptime).now().timestamp;
            unsigned long long ts_ms = (unsigned long long) now * 1000ULL;

            char body[64];
            snprintf(
              body,
              sizeof(body),
              "{\"t\": %.2f, \"ts\": %llu}",
              t,
              ts_ms
            );

            return std::string(body);
          capture_response: false

# -------- INTERVALO PARA LED WIFI Y ENVÍO DE DATOS --------
interval:
  - interval: 1s
    then:
      - lambda: |-
          static int contador_led = 0;
          static int contador_envios = 0;
          contador_led++;
          if (contador_led >= 120) contador_led = 0;

          if (wifi::global_wifi_component->is_connected()) {
            id(wifi_led_light).turn_on().perform();
          } 
          else if (wifi::global_wifi_component->is_ap_active()) {
            if (contador_led % 1 == 0) {
              id(wifi_led_light).toggle().perform();
            } 
          }
          else {
            if (contador_led % 3 == 0) {
              id(wifi_led_light).toggle().perform();
            }
          }

          auto now = id(esptime).now();
          if (now.is_valid()) { contador_envios = now.second;
          } else {
            contador_envios++;
            if (contador_envios >= 60) contador_envios = 0;
          }

          int seg_actual = contador_envios;

          if (seg_actual == 15) {
            if (id(sensor_ok) && now.is_valid()) {
              id(enviar_grafica).execute();
            }
          } 

          if (seg_actual == 45) {
              id(enviar_vivo).execute();
            }
