esphome:
  name: temperatura-sala3

esp8266:
  board: d1_mini_lite

logger:
  level: DEBUG

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  on_connect:
    then:
      - script.stop: wifi_connecting
      - script.execute: wifi_connected

  on_disconnect:
    then:
      - script.execute: wifi_connecting

  ap:
    ssid: "Temperatura sala_3"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

  # ////////////////////////////////////////////////////////////////////////

# -------- HTTP --------
http_request:
  useragent: esphome/d1mini
  timeout: 3s
  verify_ssl: false
  id: http_request_sala3

# -------- VARIABLES --------
globals:
  - id: last_temp_sent_to_function
    type: float
    initial_value: "NAN"

  - id: temp_to_send
    type: float

  - id: hum_to_send
    type: float

  - id: sensor_ok
    type: bool
    initial_value: "false"

  - id: firebase_url_secret
    type: std::string
    initial_value: !secret firebase_sala3_grafica

#---------- LED ESTADO WIFI -----------
output:
  - platform: gpio
    pin: D4
    id: wifi_led

light:
  - platform: binary
    output: wifi_led
    id: wifi_led_light

# -------- TIME --------
time:
  - platform: sntp
    id: esptime
    timezone: "America/Bogota"

# -------- DHT11 --------
sensor:
  - platform: dht
    pin: D1
    model: DHT11
    update_interval: 30s
    temperature:
      id: temp_dht
      filters:
        - filter_out: NAN
        - delta: 0.1
      on_value:
        then:
          - lambda: |-
              id(sensor_ok) = true;
              id(temp_to_send) = x;
              id(hum_to_send) = id(hum_dht).state;

              if (std::isnan(id(last_temp_sent_to_function)) || 
                  std::abs(x - id(last_temp_sent_to_function)) >= 0.5) {
                
                id(send_temp_hum).execute();
                id(last_temp_sent_to_function) = x;
                ESP_LOGD("custom", "Cambio significativo detectado. Enviando a Firebase...");
              }
    humidity:
      id: hum_dht
      filters:
        - filter_out: NAN

# -------- SCRIPT ENVÍO A FIREBASE TEMP Y HUM --------
script:
  - id: send_temp_hum
    mode: queued
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.send:
                id: http_request_sala3
                method: PATCH
                url: !secret firebase_sala3_TempHum
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                  char buffer[64];

                  if (std::isnan(id(temp_to_send))) {
                    sprintf(buffer, "{\"temperatura\": \"null\", \"humedad\": \"null\"}");
                  } else {
                    sprintf(
                      buffer,
                      "{\"temperatura\": %.2f, \"humedad\": %.2f}",
                      id(temp_to_send),
                      id(hum_to_send)
                    );
                  }

                  return (std::string) buffer;

  #---------- SCRIPT CONEXION WIFI ------------------------
  - id: wifi_connecting
    mode: restart
    then:
      - while:
          condition:
            not:
              wifi.connected:
          then:
            - light.turn_on: wifi_led_light
            - delay: 300ms
            - light.turn_off: wifi_led_light
            - delay: 300ms

  - id: wifi_connected
    then:
      - light.turn_on: wifi_led_light

  # -------- ENVÍO A FIREBASE HEARTBEAT (SIGUE VIVO) --------
interval:
  - interval: 60s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.send:
                id: http_request_sala3
                method: PATCH
                url: !secret firebase_sala3_heartbeat
                request_headers:
                  Content-Type: application/json
                body: '{"timestamp":{".sv":"timestamp"}}'

  # -------- GRAFICA --------
  - interval: 60s
    then:
      - delay: 15s
      - if:
          condition:
            lambda: |-
              return wifi::global_wifi_component->is_connected() &&
                     id(sensor_ok) &&
                     !std::isnan(id(temp_dht).state) &&
                     id(esptime).now().is_valid();
          then:
            - http_request.post:
                id: http_request_sala3
                url: !lambda |-
                  auto now = id(esptime).now();

                  char url_buffer[160];

                  sprintf(
                    url_buffer,
                    "%s%04d-%02d-%02d/%02d.json",
                    id(firebase_url_secret).c_str(),
                    now.year,
                    now.month,
                    now.day_of_month,
                    now.hour
                  );

                  return std::string(url_buffer);
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                  float t = id(temp_dht).state;
                  time_t now = id(esptime).now().timestamp;
                  unsigned long long ts_ms = (unsigned long long) now * 1000ULL;

                  char body[64];
                  snprintf(
                    body,
                    sizeof(body),
                    "{\"t\": %.2f, \"ts\": %llu}",
                    t,
                    ts_ms
                  );

                  return std::string(body);

                capture_response: false


