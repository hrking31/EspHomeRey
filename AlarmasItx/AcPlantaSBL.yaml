esphome:
  name: ac-planta-sbl

esp8266:
  board: nodemcuv2

logger:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  on_connect:
    then:
      - script.stop: wifi_connecting
      - script.execute: wifi_connected

  on_disconnect:
    then:
      - script.execute: wifi_connecting

  ap:
    ssid: "Temperatura SBL"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

  # ////////////////////////////////////////////////////////////////////////

# -------- HTTP --------
http_request:
  useragent: esphome/nodemcu
  timeout: 5s
  verify_ssl: false
  id: http_request_sbl

# -------- TIME --------
time:
  - platform: sntp
    id: esptime
    timezone: "America/Bogota"

#---------- LED ESTADO WIFI -----------
output:
  - platform: gpio
    pin:
      number: 16
      # inverted: true
    id: wifi_led

light:
  - platform: binary
    output: wifi_led
    id: wifi_led_light

# -------- PINES --------
binary_sensor:
  - platform: gpio
    pin:
      number: 12
      mode: INPUT_PULLUP
      # inverted: true
    id: ac_pin
    name: "AC Estado"
    on_state:
      then:
        - lambda: |-
            id(ac_estado) = id(ac_pin).state ? 1 : 0;
            id(actualizar_firebase).execute();

  - platform: gpio
    pin:
      number: 4
      mode: INPUT_PULLUP
      # inverted: true
    id: planta_pin
    name: "Planta Estado"
    on_state:
      then:
        - lambda: |-
            int nuevo_estado = id(planta_pin).state ? 1 : 0;

            // Planta encendida
            if (nuevo_estado == 1 && id(planta_estado) == 0) {
              id(planta_estado) = 1;
              auto now = id(esptime).now();
              id(engine_start_timestamp) = (uint64_t) now.timestamp * 1000;
              id(engine_runtime_start) = millis();
            }

            // Planta apagada
            else if (nuevo_estado == 0 && id(planta_estado) == 1) {
              id(planta_estado) = 0;

              if (id(engine_start_timestamp) > 0) {
                uint32_t tiempo_trabajado = millis() - id(engine_runtime_start);
                id(total_ms_acumulados) += tiempo_trabajado;
                id(engine_start_timestamp) = 0;
              }
            }

            id(actualizar_firebase).execute();

# -------- VARIABLES --------
globals:
  - id: ac_estado
    type: int
    restore_value: yes
    initial_value: "0"

  - id: planta_estado
    type: int
    restore_value: yes
    initial_value: "0"

  - id: engine_start_timestamp
    type: uint64_t
    restore_value: yes
    initial_value: "0"

  - id: total_ms_acumulados
    type: uint64_t
    restore_value: yes
    initial_value: "0"

  - id: engine_runtime_start
    type: uint32_t
    restore_value: no
    initial_value: "0"

# -------- SCRIPT FIREBASE --------
script:
  - id: actualizar_firebase
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - http_request.send:
                id: http_request_sbl
                method: PATCH
                url: !secret firebase_monitoreo_energia
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                  char buffer[256];

                  sprintf(
                    buffer,
                    "{\"Ac\":%d,\"Planta\":%d,\"engineStartTimestamp\":%llu,\"totalMsAcumulados\":%lu}",
                    id(ac_estado),
                    id(planta_estado),
                    id(engine_start_timestamp),
                    id(total_ms_acumulados)
                  );

                  return std::string(buffer);

  #---------- SCRIPT CONEXION WIFI ------------------------
  - id: wifi_connecting
    mode: restart
    then:
      - while:
          condition:
            not:
              wifi.connected:
          then:
            - light.turn_on: wifi_led_light
            - delay: 300ms
            - light.turn_off: wifi_led_light
            - delay: 300ms

  - id: wifi_connected
    then:
      - light.turn_on: wifi_led_light

  - id: wifi_disconnected
    then:
      - light.turn_off: wifi_led_light

# -------- ENVÍO A FIREBASE HEARTBEAT (SIGUE VIVO) --------
interval:
  - interval: 60s
    then:
      - http_request.send:
          method: PATCH
          url: !secret firebase_sala_sb_heartbeat
          request_headers:
            Content-Type: application/json
          body: '{"timestamp":{".sv":"timestamp"}}'
