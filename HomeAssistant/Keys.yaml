sensor:
  - platform: internal_temperature
    name: "Temperatura C6"

  - platform: uptime
    name: "UpTime KeysProxy"
    update_interval: 60s

  - platform: ble_client
    type: characteristic
    ble_client_id: corne_ble
    name: "Bateria Corne"
    service_uuid: "180F"
    characteristic_uuid: "2A19"
    notify: true
    update_interval: 60s
    unit_of_measurement: "%"
    device_class: battery


